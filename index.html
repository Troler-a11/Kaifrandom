<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaifrandom 🤤</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161c2d; --accent: #22c55e; --gold: #facc15; --blue: #3b82f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; }
        
        /* Намальований інтерфейс профілю */
        .profile-card { background: linear-gradient(180deg, var(--card) 0%, var(--bg) 100%); padding: 25px; border-bottom: 2px solid var(--accent); text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .balance-row { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .bal-item { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); min-width: 100px; }
        .bal-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .bal-val { font-size: 18px; font-weight: bold; }
        
        /* Кнопки */
        .btn { border: none; padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-green { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(34,197,94,0.4); }
        .btn-blue { background: var(--blue); color: #fff; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .btn:active { transform: scale(0.95); }

        /* Грид кейсів */
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; padding-bottom: 100px; }
        .case-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #2d3748; text-align: center; position: relative; overflow: hidden; }
        .case-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); }
        .case-img { font-size: 40px; margin-bottom: 10px; display: block; }
        .case-price { color: var(--gold); font-weight: bold; display: block; margin-bottom: 15px; }

        /* Камінь Ножиці Папір */
        #rps-ui { display: none; padding: 20px; text-align: center; }
        .rps-btn { font-size: 40px; padding: 20px; background: var(--card); border: 2px solid var(--accent); border-radius: 20px; margin: 10px; width: 80px; }

        /* Рулетка */
        #roulette-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        .roulette-window { width: 300px; height: 100px; background: var(--card); border: 3px solid var(--gold); position: relative; overflow: hidden; display: flex; align-items: center; }
        .roulette-track { display: flex; position: absolute; left: 0; transition: left 4s cubic-bezier(0.1, 0, 0, 1); }
        .r-item { min-width: 100px; text-align: center; font-size: 24px; font-weight: bold; }
        .pointer { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: red; z-index: 2; }
    </style>
</head>
<body>

<div id="app">
    <div class="profile-card">
        <img id="u-avatar" class="avatar" src="https://via.placeholder.com/100">
        <div id="u-name" style="font-size: 20px; font-weight: bold;">Гравець</div>
        <div class="balance-row">
            <div class="bal-item"><div class="bal-label">kaifkoin 🤤</div><div id="k-bal" class="bal-val">0</div></div>
            <div class="bal-item"><div class="bal-label">kaifbablo 💵</div><div id="b-bal" class="bal-val" style="color: var(--accent);">0</div></div>
        </div>
        <button class="btn btn-green" onclick="tg.openInvoice('...')">Поповнити</button>
        <button class="btn btn-blue" onclick="showSection('withdraw')">Вивести</button>
    </div>

    <div id="main-menu" style="padding: 20px; gap: 15px; display: flex; flex-direction: column;">
        <button class="btn btn-blue" onclick="showSection('cases')">📦 Відкрити Кейси</button>
        <button class="btn btn-green" style="background: #ef4444;" onclick="showSection('rps')">✂️ Камінь Ножиці Папір</button>
    </div>

    <div id="cases-ui" style="display:none;">
        <h2 style="text-align: center;">Оберіть кейс</h2>
        <div class="cases-grid" id="case-list"></div>
        <button class="btn btn-blue" style="margin: 20px; width: calc(100% - 40px);" onclick="showSection('main')">Назад</button>
    </div>

    <div id="rps-ui">
        <h2>Ставка: <input type="number" id="rps-bet" value="1000" style="background: none; border: 1px solid var(--accent); color: white; padding: 5px; width: 100px;"></h2>
        <p id="rps-info">Раунд 1/3</p>
        <div>
            <button class="rps-btn" onclick="playRPS('rock')">🪨</button>
            <button class="rps-btn" onclick="playRPS('paper')">📄</button>
            <button class="rps-btn" onclick="playRPS('scissors')">✂️</button>
        </div>
        <button class="btn btn-blue" onclick="showSection('main')">Вийти</button>
    </div>

    <div id="withdraw-ui" style="display:none; padding: 20px;">
        <h2>Вивід коштів</h2>
        <p>Сума (мін. 1000):</p>
        <input type="number" id="w-amount" style="width:100%; padding:15px; border-radius:10px; margin-bottom:20px;">
        <p>Стать:</p>
        <button class="btn" id="g-m" onclick="gen='boy'; this.style.border='2px solid gold'">Хлопець 👦</button>
        <button class="btn" id="g-f" onclick="gen='girl'; this.style.border='2px solid gold'">Дівчина 👧</button>
        <button class="btn btn-green" style="width:100%; margin-top:20px;" onclick="doWithdraw()">Вивести в ТГ</button>
    </div>
</div>

<div id="roulette-overlay">
    <h2 id="r-status">Крутимо...</h2>
    <div class="roulette-window">
        <div class="pointer"></div>
        <div class="roulette-track" id="r-track"></div>
    </div>
    <button id="r-close" class="btn btn-blue" style="margin-top:20px; display:none;" onclick="document.getElementById('roulette-overlay').style.display='none'">Забрати</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    let kBal = 10000;
    let bBal = 0;
    let rpsR = 1, pW = 0, bW = 0, gen = null;

    // Генерація 70 кейсів
    const caseData = [];
    const pSteps = [30, 44, 56, 79, 89];
    for(let i=100; i<=100000; i+=1500) pSteps.push(i);
    
    pSteps.forEach((p, i) => {
        caseData.push({ id: i, price: p, max: p < 1000 ? 1.5 : (p < 5000 ? 5 : 50) });
    });

    const list = document.getElementById('case-list');
    caseData.forEach(c => {
        const d = document.createElement('div');
        d.className = 'case-box';
        d.innerHTML = `<span class="case-img">📦</span><span class="case-price">${c.price} 🤤</span><button class="btn btn-green" style="padding:8px; font-size:12px;" onclick="openC(${c.id})">ВІДКРИТИ</button>`;
        list.appendChild(d);
    });

    function showSection(s) {
        ['main-menu', 'cases-ui', 'rps-ui', 'withdraw-ui'].forEach(id => document.getElementById(id).style.display='none');
        document.getElementById(s+'-ui' || 'main-menu').style.display='block';
        if(s === 'main') document.getElementById('main-menu').style.display='flex';
    }

    function update() {
        document.getElementById('k-bal').innerText = kBal;
        document.getElementById('b-bal').innerText = bBal;
    }

    function openC(id) {
        let c = caseData[id];
        if(kBal < c.price) return alert("Мало коінів!");
        kBal -= c.price; update();

        let track = document.getElementById('r-track');
        track.style.left = '0px'; track.innerHTML = '';
        let items = [];
        for(let i=0; i<50; i++) {
            let mult = (Math.random() * c.max).toFixed(1);
            items.push(mult);
            track.innerHTML += `<div class="r-item">x${mult}</div>`;
        }

        document.getElementById('roulette-overlay').style.display='flex';
        document.getElementById('r-close').style.display='none';
        
        setTimeout(() => {
            track.style.left = '-4250px'; 
            setTimeout(() => {
                let win = Math.floor(c.price * parseFloat(items[42]));
                bBal += win; update();
                document.getElementById('r-status').innerText = `Виграш: ${win} 💵`;
                document.getElementById('r-close').style.display='block';
            }, 4100);
        }, 100);
    }

    function playRPS(pMove) {
        let bet = parseInt(document.getElementById('rps-bet').value);
        if(bet < 1000 || kBal < bet) return alert("Перевір ставку/баланс!");
        
        const moves = ['rock', 'paper', 'scissors'];
        const beats = {rock:'scissors', paper:'rock', scissors:'paper'};
        const loses = {rock:'paper', paper:'scissors', scissors:'rock'};
        
        let bMove;
        if(rpsR < 3) {
            bMove = (Math.random() < 0.3) ? loses[pMove] : (Math.random() < 0.5 ? pMove : beats[pMove]);
        } else {
            bMove = (Math.random() < 0.93) ? loses[pMove] : beats[pMove];
        }

        if(pMove === bMove) return alert("Нічия! Переграємо раунд.");
        if(bMove === beats[pMove]) pW++; else bW++;

        if(pW==2 || bW==2 || rpsR==3) {
            if(pW > bW) {

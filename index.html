<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaifrandom 🤤</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --gold: #f2cc60; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; user-select: none; }
        
        /* Профіль */
        .header { background: #161b22; padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); }
        .bal-row { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .bal-box { background: #0d1117; padding: 10px; border-radius: 12px; min-width: 110px; border: 1px solid #30363d; }
        .bablo { color: #2ecc71; font-weight: bold; }

        /* Кнопки */
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 5px; }
        .btn-green { background: var(--accent); color: white; }
        .btn-blue { background: #1f6feb; color: white; }
        .btn-red { background: #da3633; color: white; }

        /* Кейси */
        .cases-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; padding-bottom: 80px; }
        .case-card { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #30363d; }
        .case-price { color: var(--gold); display: block; margin: 8px 0; font-weight: 800; }

        /* КНП АРЕНА (ГОРИЗОНТАЛЬНО) */
        .rps-arena { display: flex; justify-content: space-between; align-items: center; background: #000; height: 160px; border-radius: 15px; padding: 0 30px; margin: 20px 0; border: 2px solid #30363d; }
        .hand { font-size: 80px; transition: 0.3s; }
        .hand-bot { transform: scaleX(-1); }
        .shake { animation: shakeAnim 0.4s infinite; }
        @keyframes shakeAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .round-result { height: 30px; font-weight: bold; color: var(--gold); text-align: center; margin-top: 10px; }

        /* Рулетка */
        #roulette-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99; flex-direction: column; align-items: center; justify-content: center; }
        .r-track-container { width: 100%; height: 100px; background: #161b22; position: relative; overflow: hidden; border-y: 2px solid var(--gold); }
        .r-track { display: flex; position: absolute; left: 0; align-items: center; height: 100%; transition: left 4s cubic-bezier(0.1, 0, 0, 1); }
        .r-slot { min-width: 100px; text-align: center; font-size: 24px; font-weight: 900; }

        /* Вивід */
        #withdraw-ui { display: none; padding: 20px; }
        .gender-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; flex: 1; border-radius: 8px; }
        .gender-active { border-color: var(--gold); background: #30363d; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="header">
        <img id="u-avatar" class="avatar" src="">
        <h3 id="u-name">Player</h3>
        <div class="bal-row">
            <div class="bal-box">🤤 <span id="k-bal">0</span></div>
            <div class="bal-box bablo">💵 <span id="b-bal">0</span></div>
        </div>
        <button class="btn btn-green" onclick="tg.openInvoice('topup')">ПОПОЛНИТИ</button>
        <button class="btn btn-blue" onclick="showSection('withdraw')">ВИВЕСТИ</button>
        <button class="btn btn-red" onclick="showSection('rps')">ГРАТИ КНП 🤜</button>
    </div>
    <div class="cases-container" id="cases-grid"></div>
</div>

<div id="rps-ui" style="display:none; padding: 20px;">
    <h2 style="text-align:center">KAIF-RPS 🤜✌️</h2>
    <p id="rps-round-num" style="text-align:center">РАУНД 1 / 3</p>
    <div class="rps-arena">
        <div id="p-hand" class="hand">✊</div>
        <div id="b-hand" class="hand hand-bot">✊</div>
    </div>
    <div id="rps-res-text" class="round-result"></div>
    <div style="text-align:center; margin: 15px 0;">
        Ставка: <input type="number" id="rps-bet" value="1000" min="1000" style="background:#0d1117; color:white; border:1px solid #30363d; padding:8px; border-radius:8px; width:100px; text-align:center;">
    </div>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
        <button class="btn btn-blue" onclick="playRPS('rock')">✊</button>
        <button class="btn btn-blue" onclick="playRPS('paper')">✋</button>
        <button class="btn btn-blue" onclick="playRPS('scissors')">✌️</button>
    </div>
    <button class="btn" style="background:#30363d; margin-top:20px;" onclick="location.reload()">НАЗАД</button>
</div>

<div id="withdraw-ui">
    <h2>ВИВЕДЕННЯ 🤤</h2>
    <p>Сума (від 1000 💵):</p>
    <input type="number" id="w-amt" placeholder="1000" style="width:100%; padding:15px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:10px; margin-bottom:15px;">
    <p>Ваша стать:</p>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="gender-btn" id="g-m" onclick="setGender('boy')">ХЛОПЕЦЬ 👦</button>
        <button class="gender-btn" id="g-f" onclick="setGender('girl')">ДІВЧИНА 👧</button>
    </div>
    <button class="btn btn-green" onclick="processWithdraw()">ВИТЯГТИ ПОДАРУНКИ</button>
    <button class="btn" style="background:#30363d; margin-top:10px;" onclick="location.reload()">СКАСУВАТИ</button>
</div>

<div id="roulette-overlay">
    <h2 id="r-status">УДАЧІ!</h2>
    <div class="r-track-container">
        <div style="position:absolute; left:50%; width:2px; height:100%; background:red; z-index:10;"></div>
        <div class="r-track" id="r-track"></div>
    </div>
    <button id="r-close" class="btn btn-green" style="display:none; width:150px; margin-top:30px;" onclick="location.reload()">ЗАБРАТИ</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let kBal = 2000, bBal = 0, gender = null, round = 1, pWin = 0, bWin = 0;

    // --- ГЕНЕРАЦІЯ КЕЙСІВ (70+ штук) ---
    const prices = [30, 44, 56, 79, 89];
    for(let i=100; i<=100000; i+=1500) prices.push(i);
    const grid = document.getElementById('cases-grid');
    
    prices.forEach((p, i) => {
        grid.innerHTML += `
            <div class="case-card">
                <span>КЕЙС #${i+1}</span>
                <span class="case-price">${p} 🤤</span>
                <button class="btn btn-green" style="font-size:10px; padding:5px;" onclick="openCase(${p})">ВІДКРИТИ</button>
            </div>`;
    });

    function showSection(id) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('withdraw-ui').style.display = 'none';
        document.getElementById(id + '-ui').style.display = 'block';
    }

    // --- ЛОГІКА КЕЙСІВ (ЖОРСТКІ ШАНСИ) ---
    function openCase(cost) {
        if(kBal < cost) return alert("Мало kaifkoin! 🤤");
        kBal -= cost; updateUI();
        document.getElementById('roulette-overlay').style.display = 'flex';
        
        const track = document.getElementById('r-track');
        track.style.transition = 'none'; track.style.left = '0px'; track.innerHTML = '';
        
        let pool = [];
        for(let i=0; i<60; i++) {
            let roll = Math.random() * 100;
            let m = 0;
            if(cost < 100) { // Дешеві кейси
                if(roll < 1) m = 1.5;
                else if(roll < 5) m = 1.2;
                else if(roll < 35) m = 1.0;
                else if(roll < 70) m = 0.5;
                else m = 0.1;
            } else { // Дорогі
                if(roll < 0.5) m = 50.0;
                else if(roll < 2) m = 5.0;
                else if(roll < 10) m = 1.1;
                else if(roll < 50) m = 0.5;
                else m = 0.1;
            }
            pool.push(m);
            track.innerHTML += `<div class="r-slot">x${m}</div>`;
        }

        setTimeout(() => {
            track.style.transition = 'left 4s cubic-bezier(0.1, 0, 0, 1)';
            track.style.left = -(50 * 100) + (window.innerWidth/2) - 50 + 'px';
            setTimeout(() => {
                let winMult = pool[50];
                let win = Math.floor(cost * winMult);
                babloBal(win);
                document.getElementById('r-status').innerText = `ВИГРАШ: ${win} 💵`;
                document.getElementById('r-close').style.display = 'block';
            }, 4100);
        }, 50);
    }

    // --- РОЗУМНИЙ КНП (Бот підглядає) ---
    function playRPS(pMove) {
        const bet = parseInt(document.getElementById('rps-bet').value);
        if(bet < 1000 || kBal < bet) return alert("Ставка від 1000 або мало коінів!");

        const pHand = document.getElementById('p-hand');
        const bHand = document.getElementById('b-hand');
        const resText = document.getElementById('rps-res-text');

        pHand.className = 'hand shake';
        bHand.className = 'hand hand-bot shake';
        resText.innerText = "РАЗ... ДВА... ТРИ!";

        setTimeout(() => {
            pHand.className = 'hand';
            bHand.className = 'hand hand-bot';
            
            const losesTo = { rock: 'paper', paper: 'scissors', scissors: 'rock' };
            const winsTo = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
            let bMove;

            // Логіка: бот дає виграти 1 або 2 раунд, але валить на 3-му
            if(round < 3) {
                if(Math.random() < 0.3) bMove = winsTo[pMove]; // Бот програє раунд
                else bMove = losesTo[pMove]; // Бот виграє раунд
            } else {
                // Фінальний раунд: 93% бот виграє
                bMove = (Math.random() < 0.93) ? losesTo[pMove] : winsTo[pMove];
            }

            pHand.innerText = getIcon(pMove);
            bHand.innerText = getIcon(bMove);

            if(pMove === bMove) {
                resText.innerText = "НІЧИЯ! Переграємо раунд.";
            } else if(bMove === losesTo[pMove]) {
                bWin++; resText.innerText = "БОТ ВИГРАВ РАУНД! 🤖";
            } else {
                pWin++; resText.innerText = "ВИ ВИГРАЛИ РАУНД! 🎉";
            }

            setTimeout(() => {
                if(pWin === 2 || bWin === 2 || round === 3) {
                    if(pWin > bWin) {
                        let win = Math.floor(bet * 1.5);
                        babloBal(win);
                        alert("ПЕРЕМОГА В ДУЕЛІ! +"+win+" 💵");
                    } else {
                        kBal -= bet;
                        alert("ВИ ПРОГРАЛИ ДУЕЛЬ! 💀");
                    }
                    location.reload();
                } else {
                    round++;
                    document.getElementById('rps-round-num').innerText = `РАУНД ${round} / 3`;
                    resText.innerText = "Оберіть фігуру...";
                }
                updateUI();
            }, 1500);
        }, 1200);
    }

    // --- ВИВІД ---
    function processWithdraw() {
        let amt = parseInt(document.getElementById('w-amt').value);
        if(amt < 1000 || bBal < amt || !gender) return alert("Перевірте суму та стать!");
        
        bBal -= amt;
        let rem = amt;
        let gifts = [];
        [100, 50, 25, 15].forEach(v => {
            let count = Math.floor(rem / v);
            if(count > 0) gifts.push(`${v}x${count}`);
            rem %= v;
        });
        
        alert(`ЗАЯВКА ПРИЙНЯТА!\nПодарунки: ${gifts.join(', ')}\nЗгоріло (залишок): ${rem}`);
        tg.sendData(JSON.stringify({amt: amt, gender: gender}));
        location.reload();
    }

    function babloBal(val) { bBal += val; updateUI(); }
    function getIcon(m) { return m === 'rock' ? '✊' : m === 'paper' ? '✋' : '✌️'; }
    function setGender(g) { 
        gender = g; 
        document.getElementById('g-m').className = 'gender-btn' + (g==='boy'?' gender-active':'');
        document.getElementById('g-f').className = 'gender-btn' + (g==='girl'?' gender-active':'');
    }
    function updateUI() { document.getElementById('k-bal').innerText = kBal; document.getElementById('b-bal').innerText = bBal; }

    window.onload = () => {
        const u = tg.initDataUnsafe?.user;
        if(u) {
            document.getElementById('u-name').innerText = u.first_name;
            document.getElementById('u-avatar').src = u.photo_url || 'https://via.placeholder.com/100';
        }
        updateUI();
    };
</script>
</body>
</html>

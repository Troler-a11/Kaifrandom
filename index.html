<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaifrandom 🤤</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e16; --card: #1c2230; --accent: #22c55e; --gold: #facc15; --text: #ffffff; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; -webkit-user-select: none; }
        
        /* Профіль */
        .header { background: linear-gradient(180deg, #1e293b 0%, var(--bg) 100%); padding: 25px; text-align: center; border-bottom: 2px solid var(--accent); border-radius: 0 0 30px 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .bal-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .bal-item { background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .bal-label { font-size: 11px; color: #94a3b8; }
        .bal-num { font-size: 16px; font-weight: bold; margin-top: 5px; }

        /* Кнопки */
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase; }
        .btn-topup { background: var(--accent); color: #000; margin-bottom: 8px; }
        .btn-out { background: var(--blue); color: #fff; }
        .btn-rps { background: #ef4444; color: white; margin-top: 10px; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

        /* Кейси */
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; padding-bottom: 100px; }
        .case-card { background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #2d3748; }
        .case-price { color: var(--gold); font-weight: 900; display: block; margin: 10px 0; }

        /* Анімація КНП */
        .rps-arena { display: flex; justify-content: space-around; align-items: center; height: 180px; background: rgba(0,0,0,0.2); border-radius: 20px; margin: 20px 0; }
        .hand { font-size: 70px; transition: 0.2s; }
        .shake { animation: shakeHand 0.5s infinite; }
        @keyframes shakeHand { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .bot-h { transform: scaleX(-1); }
        .rps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .choice-card { background: var(--card); border: 2px solid #334155; border-radius: 15px; padding: 15px 5px; text-align: center; }

        /* Рулетка */
        #roulette { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        .r-window { width: 100%; height: 100px; background: #111827; overflow: hidden; position: relative; border-y: 2px solid var(--gold); margin: 20px 0; }
        .r-track { display: flex; position: absolute; left: 0; transition: left 4s cubic-bezier(0.1, 0, 0, 1); align-items: center; height: 100%; }
        .r-item { min-width: 90px; text-align: center; font-size: 22px; font-weight: 900; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="header">
        <img id="u-avatar" class="avatar" src="">
        <div id="u-name" style="font-weight: bold; font-size: 18px;">Гравець</div>
        <div class="bal-container">
            <div class="bal-item"><div class="bal-label">kaifkoin 🤤</div><div id="k-bal" class="bal-num">0</div></div>
            <div class="bal-item"><div class="bal-label">kaifbablo 💵</div><div id="b-bal" class="bal-num" style="color:var(--accent)">0</div></div>
        </div>
        <button class="btn btn-topup" onclick="tg.openInvoice('topup')">ПОПОВНИТИ</button>
        <button class="btn btn-out" onclick="show('withdraw')">ВИВЕСТИ</button>
        <button class="btn btn-rps" onclick="show('rps')">ГРАТИ КНП 🤜✌️</button>
    </div>
    <div class="cases-grid" id="cases-list"></div>
</div>

<div id="rps-ui" style="display:none; padding: 20px; text-align:center;">
    <h2 style="color:var(--gold)">ДУЕЛЬ KAIF</h2>
    <div id="rps-status">Раунд 1/3</div>
    <div class="rps-arena">
        <div id="p-hand" class="hand">✊</div>
        <div id="b-hand" class="hand bot-h">✊</div>
    </div>
    <div style="margin-bottom:15px;">Ставка: <input type="number" id="rps-bet" value="1000" style="width:70px; background:none; border:1px solid var(--accent); color:white; border-radius:5px; padding:5px;"></div>
    <div class="rps-grid">
        <div class="choice-card" onclick="playRPS('rock')"><span>✊</span><br><small>КАМІНЬ</small></div>
        <div class="choice-card" onclick="playRPS('paper')"><span>✋</span><br><small>ПАПІР</small></div>
        <div class="choice-card" onclick="playRPS('scissors')"><span>✌️</span><br><small>НОЖИЦІ</small></div>
    </div>
    <button class="btn" style="margin-top:20px; background:#475569; color:white;" onclick="location.reload()">НАЗАД</button>
</div>

<div id="withdraw-ui" style="display:none; padding: 20px;">
    <h2>ВИВІД 🤤</h2>
    <input type="number" id="w-amt" placeholder="Сума (від 1000)" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:15px;">
    <p>Хто ви?</p>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn" id="g-boy" onclick="gen='boy'; this.style.border='2px solid var(--gold)'">ХЛОПЧИК 👦</button>
        <button class="btn" id="g-girl" onclick="gen='girl'; this.style.border='2px solid var(--gold)'">ДІВЧИНКА 👧</button>
    </div>
    <button class="btn btn-topup" onclick="doOut()">ПІДТВЕРДИТИ</button>
    <button class="btn" style="margin-top:10px; background:grey; color:white;" onclick="location.reload()">НАЗАД</button>
</div>

<div id="roulette">
    <h2 id="r-res">КРУТИМО...</h2>
    <div class="r-window"><div style="position:absolute; left:50%; width:2px; height:100%; background:red; z-index:5;"></div><div class="r-track" id="r-track"></div></div>
    <button id="r-btn" class="btn btn-topup" style="display:none; width:150px;" onclick="location.reload()">ЗАБРАТИ</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let kBal = 10000, bBal = 0, gen = null, rR = 1, pW = 0, bW = 0;
    const icons = {rock:'✊', paper:'✋', scissors:'✌️'};

    // Генеруємо 70 кейсів
    const prices = [30, 44, 56, 79, 89];
    for(let i=100; i<=100000; i+=1500) prices.push(i);
    prices.forEach((p, i) => {
        document.getElementById('cases-list').innerHTML += `
            <div class="case-card">
                <span>📦 КЕЙС #${i+1}</span>
                <span class="case-price">${p} 🤤</span>
                <button class="btn btn-topup" style="padding:5px;" onclick="openCase(${p})">ВІДКРИТИ</button>
            </div>`;
    });

    function show(id) { document.getElementById('main-ui').style.display='none'; document.getElementById(id+'-ui').style.display='block'; }

    function openCase(cost) {
        if(kBal < cost) return alert("Мало kaifkoin!");
        kBal -= cost; update();
        document.getElementById('roulette').style.display='flex';
        const track = document.getElementById('r-track');
        track.style.transition='none'; track.style.left='0px'; track.innerHTML='';
        let items = [];
        for(let i=0; i<60; i++) {
            let m = (Math.random() * (cost > 5000 ? 50 : 1.5)).toFixed(1);
            items.push(m);
            track.innerHTML += `<div class="r-item">x${m}</div>`;
        }
        setTimeout(() => {
            track.style.transition='left 4s cubic-bezier(0.1, 0, 0, 1)';
            track.style.left = -(50*90) + (window.innerWidth/2) - 45 + 'px';
            setTimeout(() => {
                let win = Math.floor(cost * items[50]);
                bBal += win; update();
                document.getElementById('r-res').innerText = `ВИГРАШ: ${win} 💵`;
                document.getElementById('r-btn').style.display='block';
            }, 4100);
        }, 50);
    }

    function playRPS(pM) {
        const bet = parseInt(document.getElementById('rps-bet').value);
        if(bet < 1000 || kBal < bet) return alert("Ставка від 1000!");
        const pBtn = document.getElementById('p-hand'), bBtn = document.getElementById('b-hand');
        pBtn.className = 'hand shake'; bBtn.className = 'hand bot-h shake';
        pBtn.innerText = '✊'; bBtn.innerText = '✊';
        
        setTimeout(() => {
            pBtn.className = 'hand'; bBtn.className = 'hand bot-h';
            const beats = {rock:'scissors', paper:'rock', scissors:'paper'}, loses = {rock:'paper', paper:'scissors', scissors:'rock'};
            let bM = (rR < 3) ? (Math.random() < 0.4 ? loses[pM] : beats[pM]) : (Math.random() < 0.93 ? loses[pM] : beats[pM]);
            pBtn.innerText = icons[pM]; bBtn.innerText = icons[bM];
            if(pM !== bM) { if(bM === beats[pM]) pW++; else bW++; }
            if(pW==2 || bW==2 || rR==3) {
                if(pW > bW) { bBal += bet*1.5; alert("ПЕРЕМОГА! +"+bet*1.5); } else { kBal -= bet; alert("ЗЛИТО!"); }
                location.reload();
            } else { rR++; document.getElementById('rps-status').innerText = `Раунд ${rR}/3`; }
            update();
        }, 1200);
    }

    function doOut() {
        let a = parseInt(document.getElementById('w-amt').value);
        if(a < 1000 || bBal < a || !gen) return alert("Помилка!");
        bBal -= a; update();
        let r = a, msg = "Вивід: ";
        [100, 50, 25, 15].forEach(v => { msg += `${v}x${Math.floor(r/v)} `; r %= v; });
        alert(msg + (r > 0 ? `(Згоріло: ${r})` : ""));
        tg.sendData(JSON.stringify({amt: a, gen: gen}));
        location.reload();
    }

    function update() { document.getElementById('k-bal').innerText = kBal; document.getElementById('b-bal').innerText = bBal; }

    window.onload = () => {
        let u = tg.initDataUnsafe?.user;
        if(u) { document.getElementById('u-name').innerText = u.first_name; document.getElementById('u-avatar').src = u.photo_url || 'https://via.placeholder.com/100'; }
        update();
    };
</script>
</body>
</html>

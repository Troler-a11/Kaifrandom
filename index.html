<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaifrandom 🤤</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --gold: #f2cc60; --text: #c9d1d9; --red: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; user-select: none; }
        
        .header { background: #161b22; padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); }
        .bal-row { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .bal-box { background: #0d1117; padding: 8px; border-radius: 10px; min-width: 100px; border: 1px solid #30363d; font-weight: bold; }

        /* Повідомлення на весь екран */
        #flash-msg {
            display: none; position: fixed; inset: 0; z-index: 9999;
            align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; text-transform: uppercase;
            animation: fadeInOut 1.5s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1.1); }
            70% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* Кейси */
        .cases-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; padding-bottom: 100px; }
        .case-card { background: var(--card); border-radius: 15px; padding: 12px; text-align: center; border: 1px solid #30363d; }
        .case-price { color: var(--gold); font-weight: 800; margin: 5px 0; display: block; }
        
        /* Повзунок кількості */
        .multi-open { margin: 10px 0; font-size: 12px; }
        input[type=range] { width: 80%; accent-color: var(--accent); }

        /* КНП */
        .rps-arena { display: flex; justify-content: space-between; align-items: center; background: #000; height: 140px; border-radius: 15px; padding: 0 20px; margin: 15px 0; }
        .hand { font-size: 60px; }
        .hand-bot { transform: scaleX(-1); }
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Рулетка */
        #roulette-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .r-track-container { width: 100%; height: 80px; background: #161b22; position: relative; overflow: hidden; border-y: 2px solid var(--gold); }
        .r-track { display: flex; position: absolute; left: 0; align-items: center; height: 100%; transition: left 4s cubic-bezier(0.1, 0, 0, 1); }
        .r-slot { min-width: 80px; text-align: center; font-size: 20px; font-weight: 800; }
        
        .btn { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-green { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="flash-msg"></div>

<div id="main-ui">
    <div class="header">
        <h3 id="u-name">Player</h3>
        <div class="bal-row">
            <div class="bal-box">🤤 <span id="k-bal">0</span></div>
            <div class="bal-box" style="color:#2ecc71">💵 <span id="b-bal">0</span></div>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-green" onclick="showS('withdraw')">ВИВІД</button>
            <button class="btn" style="background:#da3633; color:white;" onclick="showS('rps')">КНП 🤜</button>
        </div>
    </div>

    <div style="text-align:center; padding: 10px; background:#161b22; margin: 10px; border-radius:10px;">
        <div class="multi-open">ВІДКРИТИ ОДРАЗУ: <b id="count-val">1</b></div>
        <input type="range" id="open-range" min="1" max="10" value="1" oninput="document.getElementById('count-val').innerText=this.value">
    </div>

    <div class="cases-container" id="cases-grid"></div>
</div>

<div id="rps-ui" style="display:none; padding: 20px; text-align:center;">
    <h2>KAIF-RPS 🤜✌️</h2>
    <div class="rps-arena">
        <div id="p-hand" class="hand">✊</div>
        <div id="b-hand" class="hand hand-bot">✊</div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
        <button class="btn btn-green" onclick="playRPS('rock')">✊</button>
        <button class="btn btn-green" onclick="playRPS('paper')">✋</button>
        <button class="btn btn-green" onclick="playRPS('scissors')">✌️</button>
    </div>
    <button class="btn" style="margin-top:20px; background:grey; color:white;" onclick="location.reload()">НАЗАД</button>
</div>

<div id="roulette-overlay">
    <h2 id="r-status">КРУТИМО...</h2>
    <div class="r-track-container">
        <div style="position:absolute; left:50%; width:2px; height:100%; background:red; z-index:10;"></div>
        <div class="r-track" id="r-track"></div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    // ПОЧАТКОВИЙ БАЛАНС 1,000,000
    let kBal = parseInt(localStorage.getItem('kBal')) || 1000000;
    let bBal = parseInt(localStorage.getItem('bBal')) || 0;
    let round = 1, pWin = 0, bWin = 0;

    // Створюємо 70 РІЗНИХ кейсів
    const prices = [30, 44, 56, 79, 89];
    for(let i=100; i<100000; i+=1450) prices.push(i);

    const grid = document.getElementById('cases-grid');
    prices.forEach((p, i) => {
        grid.innerHTML += `
            <div class="case-card">
                <span>КЕЙС #${i+1}</span>
                <span class="case-price">${p} 🤤</span>
                <button class="btn btn-green" style="font-size:10px;" onclick="openCase(${p}, ${i})">ВІДКРИТИ</button>
            </div>`;
    });

    function flash(text, isWin) {
        const el = document.getElementById('flash-msg');
        el.innerText = text;
        el.style.color = isWin ? '#238636' : '#da3633';
        el.style.background = isWin ? 'rgba(35,134,54,0.2)' : 'rgba(218,54,51,0.2)';
        el.style.display = 'flex';
        setTimeout(() => { el.style.display = 'none'; }, 1500);
    }

    function openCase(price, id) {
        const count = parseInt(document.getElementById('open-range').value);
        const totalCost = price * count;
        if(kBal < totalCost) return alert("Мало коштів!");
        
        kBal -= totalCost; save();
        document.getElementById('roulette-overlay').style.display = 'flex';
        const track = document.getElementById('r-track');
        track.style.transition = 'none'; track.style.left = '0px'; track.innerHTML = '';
        
        let pool = [];
        // Кожен кейс має свою "вдачу" залежно від ID
        for(let i=0; i<60; i++) {
            let roll = Math.random() * 100;
            let m = (roll < (5 + id/10)) ? 1.5 : (roll < 40 ? 1.0 : 0.1);
            if(price > 50000 && roll < 0.5) m = 50.0; 
            pool.push(m);
            track.innerHTML += `<div class="r-slot">x${m}</div>`;
        }

        setTimeout(() => {
            track.style.transition = 'left 4s cubic-bezier(0.1, 0, 0, 1)';
            track.style.left = -(50 * 80) + (window.innerWidth/2) - 40 + 'px';
            setTimeout(() => {
                let win = Math.floor(totalCost * pool[50]);
                bBal += win; save();
                document.getElementById('roulette-overlay').style.display = 'none';
                flash(win > totalCost ? "ВИГРАШ +" + win : "ПРОГРАШ " + win, win > totalCost);
            }, 4100);
        }, 50);
    }

    function playRPS(pMove) {
        const bet = 1000;
        const pHand = document.getElementById('p-hand');
        const bHand = document.getElementById('b-hand');
        pHand.className = 'hand shake'; bHand.className = 'hand hand-bot shake';

        setTimeout(() => {
            pHand.className = 'hand'; bHand.className = 'hand hand-bot';
            const losesTo = {rock:'paper', paper:'scissors', scissors:'rock'};
            // Твоя логіка 93% програшу
            let bMove = (Math.random() < 0.93) ? losesTo[pMove] : 'rock'; 
            pHand.innerText = pMove == 'rock' ? '✊' : (pMove == 'paper' ? '✋' : '✌️');
            bHand.innerText = bMove == 'rock' ? '✊' : (bMove == 'paper' ? '✋' : '✌️');

            if(pMove !== bMove) {
                if(bMove === losesTo[pMove]) { 
                    bWin++; flash("РАУНД ПРОГРАНО!", false); 
                } else { 
                    pWin++; flash("РАУНД ВИГРАНО!", true); 
                }
            }

            if(pWin == 2 || bWin == 2) {
                if(pWin > bWin) { bBal += bet*1.5; flash("ДУЕЛЬ ВИГРАНА!", true); }
                else { kBal -= bet; flash("ДУЕЛЬ ПРОГРАНА!", false); }
                pWin = 0; bWin = 0; save();
                setTimeout(() => location.reload(), 1600);
            }
        }, 1200);
    }

    function save() {
        localStorage.setItem('kBal', kBal);
        localStorage.setItem('bBal', bBal);
        updateUI();
    }
    function updateUI() {
        document.getElementById('k-bal').innerText = kBal;
        document.getElementById('b-bal').innerText = bBal;
    }
    function showS(id) { document.getElementById('main-ui').style.display='none'; document.getElementById(id+'-ui').style.display='block'; }

    window.onload = () => { updateUI(); };
</script>
</body>
</html>
